services:
  - type: web
    name: khis90
    runtime: node
    plan: free
    buildCommand: cd backend && npm ci && cd ../frontend && npm ci --include=dev && npm run build && cd ../backend && npm run db:setup
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: khis90-db
          property: connectionString

databases:
  - name: khis90-db
    plan: free
